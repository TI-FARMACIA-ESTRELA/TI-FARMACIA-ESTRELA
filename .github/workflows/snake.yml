# Cobrinha: apenas SVG tema escuro, cobra vermelha (sem versao clara nem GIF duplicado).
# Repo: https://github.com/TI-FARMACIA-ESTRELA/TI-FARMACIA-ESTRELA
name: Gerar animacao da cobrinha

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      github_user_for_snake:
        description: "Login GitHub (sem @). Vazio = variavel ou dono do repo."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Cobra vermelha. Nao definir color_dots aqui: tons escuros iguais ao fundo somem a grade.
      # palette=github-dark ja traz os 5 niveis de contribuicao visiveis no SVG.
      # Azul na cobra: trocar color_snake por %230c4a6e
      - name: Gerar SVG escuro (cobra vermelha)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.github_user_for_snake != '' && github.event.inputs.github_user_for_snake || vars.SNAKE_CONTRIBUTION_USER || github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23ef4444

      - name: Publicar na branch output
        uses: crazy-max/ghaction-github-pages@v3.2.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
