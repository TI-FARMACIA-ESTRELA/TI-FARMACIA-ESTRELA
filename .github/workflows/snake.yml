# Animacao da cobrinha a partir da grade de contribuicoes GitHub.
# Padrao: dono do repositorio (TI-FARMACIA-ESTRELA). Sobrescreva com SNAKE_CONTRIBUTION_USER ou input.
#
# Repo: https://github.com/TI-FARMACIA-ESTRELA/TI-FARMACIA-ESTRELA
name: Gerar animacao da cobrinha

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      github_user_for_snake:
        description: "Login GitHub (sem @). Vazio = variavel SNAKE_CONTRIBUTION_USER ou dono do repo."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Gerar SVG e GIF (contribuicoes)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.github_user_for_snake != '' && github.event.inputs.github_user_for_snake || vars.SNAKE_CONTRIBUTION_USER || github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.gif?color_snake=%230d9488&color_dots=%23e2e8f0,%23cbd5e1,%2314b8a6,%230f766e,%23064748&color_background=%230f172a

      - name: Publicar na branch output
        uses: crazy-max/ghaction-github-pages@v3.2.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
